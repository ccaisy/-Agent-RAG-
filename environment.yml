name: my_llm_project
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - openai>=1.0.0       # OpenAI / DeepSeek 兼容客户端
      - python-dotenv>=1.0.0 # 环境变量管理（API Key 等敏感信息）
      - numpy>=1.24.0        # 向量计算基础库
      - faiss-cpu>=1.7.0     # 本地向量检索（CPU 版本，macOS 友好）
      - requests>=2.31.0     # HTTP 请求
      - gnureadline>=6.8     # 修复 macOS 终端中文输入回退/光标问题（替代 libedit）
